name: Build (Linux GCC)

# Triggers: pull_request (build PRs to main, both Debug AND Release) + manual
# workflow_dispatch (pick one config). Deliberately NO `push` trigger — we don't
# want every branch/commit push to fire a heavy build; PRs and manual runs only.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build-type:
        description: "Build configuration (manual runs only; PRs build both)"
        required: true
        default: Debug
        type: choice
        options: [Debug, Release]
      run-tests:
        description: "Run Catch2 tests (best-effort, software Vulkan)"
        required: false
        default: true
        type: boolean

concurrency:
  group: ci-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04   # ships CMake >= 3.24 (preset requirement) + Ninja
    env:
      CC: gcc
      CXX: g++
    steps:
      # .gitmodules points the public CMake/ submodule at an SSH URL
      # (git@github.com:...), but the runner has no SSH key. Rewrite SSH->HTTPS
      # globally so checkout fetches the public submodule anonymously over HTTPS.
      # Done in-CI only; .gitmodules (and the local SSH workflow) stay unchanged.
      - name: Use HTTPS for GitHub submodules
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout (with shared CMake submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive   # CMake/ holds spsSBOM/spsShaders/etc.
          fetch-depth: 1          # shallow — the build has no git-describe/history dependence,
                                  # so don't clone the CMake submodule's (or repo's) history

      # System tier (apt, every run): Vulkan loader+headers+vulkan.hpp, glslang
      # C++ API, glm, GLFW's X11/Wayland build headers, and a software Vulkan ICD
      # (lavapipe) so headless tests can at least attempt to run.
      - name: Install system dependencies
        run: |
          # ubuntu-24.04's libvulkan-dev ships Vulkan-Hpp 1.3.275, which predates
          # the move of the dispatch loaders into vk::detail (~SDK 1.3.295), so
          # vk::detail::DispatchLoaderDynamic fails to compile. Use the LunarG SDK
          # for a recent vulkan.hpp matching the local environment. glslang stays
          # on the (working) ubuntu packages.
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg-vulkan.asc >/dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            vulkan-sdk \
            glslang-dev glslang-tools \
            ninja-build pkg-config libglm-dev \
            xorg-dev libwayland-dev wayland-protocols libxkbcommon-dev \
            mesa-vulkan-drivers

      # Source-built tier (cached): the 9 pinned deps into ~/vkwavepkg.
      - name: Build & cache dependencies (vkwavepkg)
        uses: ./.github/actions/linux-deps-setup

      - name: Configure (linux-gcc preset)
        run: cmake --preset linux-gcc -DVKWAVE_FETCH_ASSETS=OFF

      # Configure is multi-config (Ninja Multi-Config), so one configure covers
      # both. A pull_request builds BOTH Debug and Release; a manual dispatch
      # builds only the chosen build-type. No matrix — just gated sequential steps.
      - name: Build (Debug)
        if: ${{ github.event_name == 'pull_request' || inputs.build-type == 'Debug' }}
        run: cmake --build build/linux-gcc --config Debug

      # Best-effort: the runner has no GPU, only software Vulkan (lavapipe), so a
      # test that demands a real device may fail. Non-blocking; the build is the
      # hard gate. (On PRs inputs.run-tests is empty, so tests run by default.)
      - name: Test (Debug)
        if: ${{ (github.event_name == 'pull_request' || inputs.build-type == 'Debug') && inputs.run-tests != 'false' }}
        continue-on-error: true
        run: ctest --test-dir build/linux-gcc -C Debug --output-on-failure

      - name: Build (Release)
        if: ${{ github.event_name == 'pull_request' || inputs.build-type == 'Release' }}
        run: cmake --build build/linux-gcc --config Release

      - name: Test (Release)
        if: ${{ (github.event_name == 'pull_request' || inputs.build-type == 'Release') && inputs.run-tests != 'false' }}
        continue-on-error: true
        run: ctest --test-dir build/linux-gcc -C Release --output-on-failure
