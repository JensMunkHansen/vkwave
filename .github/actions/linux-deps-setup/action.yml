name: 'Linux deps (vkwavepkg)'
description: >
  Source-build the pinned dependencies (Catch2, spdlog, GLFW, Dear ImGui, cgltf,
  toml11, SPIRV-Reflect, args, stb) from versions.txt into ~/vkwavepkg and cache
  them. Mirrors the local build_dependencies.sh — NOT system packages.

runs:
  using: composite
  steps:
    # Restore only. We deliberately do NOT use the combined actions/cache here:
    # its post-step save only runs when the whole JOB succeeds (save-always was
    # removed in v4), so a failure in a later step (Configure/Build) would throw
    # away the freshly built deps and force a rebuild every iteration. Instead we
    # save explicitly right after the build below.
    #
    # Cache ONLY the install tree (build_dependencies.sh deletes its build dir).
    # Key on the exact inputs that decide what's built (versions.txt + NativeDeps
    # recipes + build script); the branch segment keeps per-branch entries while
    # the `-main` restore-key lets any branch reuse main's prebuilt deps.
    - name: Restore vkwavepkg install cache
      id: cache
      uses: actions/cache/restore@v4
      with:
        path: ~/vkwavepkg/linux/gcc/install
        key: vkwavepkg-gcc-${{ runner.os }}-${{ hashFiles('versions.txt', 'NativeDeps/**', 'build_dependencies.sh') }}-${{ github.head_ref || github.ref_name }}
        restore-keys: |
          vkwavepkg-gcc-${{ runner.os }}-${{ hashFiles('versions.txt', 'NativeDeps/**', 'build_dependencies.sh') }}-main
          vkwavepkg-gcc-${{ runner.os }}-${{ hashFiles('versions.txt', 'NativeDeps/**', 'build_dependencies.sh') }}-

    - name: Build dependencies (cache miss)
      id: build_deps
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: bash ./build_dependencies.sh --compiler gcc

    # Save immediately after a successful build, BEFORE any downstream step can
    # fail. If build_deps itself failed, the composite action halts and this step
    # never runs (no `always()`), so we never cache a partial/broken install.
    - name: Save vkwavepkg install cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: ~/vkwavepkg/linux/gcc/install
        key: vkwavepkg-gcc-${{ runner.os }}-${{ hashFiles('versions.txt', 'NativeDeps/**', 'build_dependencies.sh') }}-${{ github.head_ref || github.ref_name }}
