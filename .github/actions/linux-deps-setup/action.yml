name: 'Linux deps (vkwavepkg)'
description: >
  Source-build the pinned dependencies (Catch2, spdlog, GLFW, Dear ImGui, cgltf,
  toml11, SPIRV-Reflect, args, stb) from versions.txt into ~/vkwavepkg and cache
  them. Mirrors the local build_dependencies.sh — NOT system packages.

runs:
  using: composite
  steps:
    # Cache ONLY the install tree, not the sources/build output. build_dependencies.sh
    # deletes its build dir (clean_build_directory) so locally only .../install
    # survives; the cloned repos and object files aren't needed at consume time and
    # would just bloat the cache. The install dir is the self-contained thing the
    # linux-gcc preset reads via CMAKE_PREFIX_PATH.
    #
    # The key is driven by the exact inputs that decide what gets built (versions.txt
    # + the NativeDeps recipes + the build script), so a version bump invalidates it.
    # The branch segment lets each branch keep its own entry while the `-main`
    # restore-key lets any branch reuse main's prebuilt deps (see restore-keys order).
    - name: Restore/save vkwavepkg install cache
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/vkwavepkg/linux/gcc/install
        key: vkwavepkg-gcc-${{ runner.os }}-${{ hashFiles('versions.txt', 'NativeDeps/**', 'build_dependencies.sh') }}-${{ github.head_ref || github.ref_name }}
        restore-keys: |
          vkwavepkg-gcc-${{ runner.os }}-${{ hashFiles('versions.txt', 'NativeDeps/**', 'build_dependencies.sh') }}-main
          vkwavepkg-gcc-${{ runner.os }}-${{ hashFiles('versions.txt', 'NativeDeps/**', 'build_dependencies.sh') }}-

    # On an exact cache hit this is skipped entirely. On a partial hit (e.g. a
    # branch inheriting main's cache) it still runs, but build_dependencies.sh
    # detects the already-installed deps and early-exits in seconds. Builds both
    # Debug and Release (script default) so either app configuration can link.
    - name: Build dependencies (cache miss)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: bash ./build_dependencies.sh --compiler gcc
